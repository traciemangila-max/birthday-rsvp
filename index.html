<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>30th Birthday RSVP</title>
  <style>
    body {
      font-family: 'Segoe UI', Arial, sans-serif;
      background: #f8f8f8; /* Off-white background */
      margin: 0;
      padding: 0;
      display: flex;
      justify-content: center;
      align-items: center;
      min-height: 100vh;
      color: #333;
    }
    .card {
      background: #ffffff;
      padding: 30px;
      border-radius: 15px;
      box-shadow: 0 8px 25px rgba(0,0,0,0.15);
      max-width: 500px;
      width: 100%;
      text-align: center;
      position: relative;
      overflow: hidden;
    }
    .card img {
      max-width: 150px;
      margin-bottom: 15px;
      border-radius: 8px;
    }
    h2 {
      color: #87a8d0; /* Steel pastel blue */
      margin-bottom: 10px;
      font-size: 28px;
    }
    .event-details {
      background: #f0f0f5;
      border: 2px solid #c48ca3;
      border-radius: 10px;
      padding: 15px;
      margin: 20px 0;
      font-size: 16px;
      color: #333;
    }
    label {
      display: block;
      margin-top: 12px;
      font-weight: 600;
      color: #333;
    }
    input {
      width: 100%;
      padding: 10px;
      margin-top: 6px;
      border: 1px solid #ccc;
      border-radius: 6px;
      font-size: 14px;
    }
    .attendance-buttons {
      display: flex;
      gap: 10px;
      margin-top: 8px;
    }
    .attendance-buttons button {
      flex: 1;
      padding: 18px;
      border: none;
      border-radius: 8px;
      font-size: 18px;
      cursor: pointer;
      transition: background 0.3s ease, transform 0.2s ease;
      opacity: 0.9;
    }
    .attendance-buttons button:hover {
      transform: scale(1.05);
      opacity: 1;
    }
    .yes-btn {
      background: #87a8d0; /* Steel pastel blue */
      color: #000;
      font-weight: bold;
    }
    .no-btn {
      background: #c48ca3; /* Muted dusty rose pastel */
      color: #000;
      font-weight: bold;
    }
    .selected {
      box-shadow: 0 0 15px #87a8d0;
      opacity: 1 !important;
      transform: scale(1.05);
    }
    .submit-btn {
      margin-top: 20px;
      width: 100%;
      padding: 14px;
      background: #c48ca3;
      color: #fff;
      border: none;
      border-radius: 6px;
      font-size: 18px;
      font-weight: bold;
      cursor: pointer;
      transition: background 0.3s ease;
    }
    .submit-btn:hover {
      background: #a36f85;
    }
    #responseMessage {
      margin-top: 15px;
      font-weight: 600;
      color: #87a8d0;
      text-align: center;
    }
    #confettiCanvas {
      position: absolute;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      pointer-events: none;
    }
  </style>
</head>
<body>
  <div class="card">
    <img src="C:\Users\Tracie\OneDrive\Desktop\jollibee.webp" alt="Jollibee Mascot">
    
    <h2>🎂 Aaron's 30th Birthday Bash 🎂</h2>
    
    <div class="event-details">
      📍 Venue: Jollibee Madrigal (Molito) — Twirlie Room <br>
      📅 Date: August 1, 2026 <br>
      ⏰ Time: 5:45 PM
    </div>
    
    <p>Join us for a night of fun, laughter, and celebration!</p>
    
    <form id="rsvpForm">
      <label for="guestName">Your Name:</label>
      <input type="text" id="guestName" name="guestName" required>
      
      <label>Can you attend?</label>
      <div class="attendance-buttons">
        <button type="button" class="yes-btn" onclick="setAttendance('Yes', this)">Yes</button>
        <button type="button" class="no-btn" onclick="setAttendance('No', this)">No</button>
      </div>
      <input type="hidden" id="attendance" name="attendance" required>
      
      <button type="submit" class="submit-btn">Submit RSVP</button>
    </form>
    
    <p id="responseMessage"></p>
    <canvas id="confettiCanvas"></canvas>
    

  <script>
    const scriptURL = "https://script.google.com/macros/s/AKfycbzribss0JEM-nYkwiMuZ8JleNZeF940aZBrpo0OMjCQMO6VawNshrK2oeqN3LKwDBxg/exec";
    const form = document.getElementById("rsvpForm");
    const responseMessage = document.getElementById("responseMessage");
    const attendanceInput = document.getElementById("attendance");
    const confettiCanvas = document.getElementById("confettiCanvas");
    const ctx = confettiCanvas.getContext("2d");

    function setAttendance(value, button) {
      attendanceInput.value = value;
      document.querySelectorAll('.attendance-buttons button').forEach(btn => btn.classList.remove('selected'));
      button.classList.add('selected');
    }

    function launchConfetti() {
      const pieces = [];
      for (let i = 0; i < 100; i++) {
        pieces.push({
          x: Math.random() * confettiCanvas.width,
          y: Math.random() * confettiCanvas.height,
          r: Math.random() * 6 + 2,
          d: Math.random() * 100,
          color: `hsl(${Math.random() * 360}, 100%, 70%)`,
          tilt: Math.random() * 10 - 10
        });
      }
      let angle = 0;
      function draw() {
        ctx.clearRect(0, 0, confettiCanvas.width, confettiCanvas.height);
        angle += 0.01;
        pieces.forEach(p => {
          ctx.beginPath();
          ctx.arc(p.x, p.y, p.r, 0, Math.PI*2, false);
          ctx.fillStyle = p.color;
          ctx.fill();
          p.y += Math.cos(angle + p.d) + 1 + p.r/2;
          p.x += Math.sin(angle) * 2;
          if (p.y > confettiCanvas.height) {
            p.y = -10;
            p.x = Math.random() * confettiCanvas.width;
          }
        });
        requestAnimationFrame(draw);
      }
      draw();
    }

    function resizeCanvas() {
      confettiCanvas.width = confettiCanvas.offsetWidth;
      confettiCanvas.height = confettiCanvas.offsetHeight;
    }
    window.addEventListener("resize", resizeCanvas);
    resizeCanvas();

    form.addEventListener("submit", e => {
      e.preventDefault();
      if (!attendanceInput.value) {
        responseMessage.innerHTML = "⚠️ Please select Yes or No.";
        return;
      }
      fetch(scriptURL, { method: "POST", body: new FormData(form)})
        .then(response => {
          if (attendanceInput.value === "Yes") {
            responseMessage.innerHTML = "🎉 Thank you for your response. See you!";
            launchConfetti();
          } else {
            responseMessage.innerHTML = "🙏 Thank you for letting us know.";
          }
        })
        .catch(error => responseMessage.innerHTML = "⚠️ Error: " + error.message);
    });
  </script>
</body>
</html>
